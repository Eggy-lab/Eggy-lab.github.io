<style>
.mini-player {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  opacity: 0.9;
  transition: opacity 0.25s;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  font-family: Georgia, serif;
}
.mini-player:hover { opacity: 1; }
.mini-player .mp-btn {
  position: relative;
  background: transparent !important;
  border: none !important;
  outline: none !important;
  box-shadow: none !important;
  padding: 0;
  cursor: pointer;
  line-height: 1;
  transition: transform 0.3s ease;
}
.mini-player .mp-btn:hover { transform: scale(1.08); }
.mini-player .mp-emoji { font-size: 72px; display: inline-block; }
.mini-player .mp-icon {
  position: absolute;
  left: 50%;
  top: 77%;
  transform: translate(-50%, -50%);
  width: 16px; height: 16px;
  border-radius: 50%;
  background: rgba(255, 248, 230, 0.35);
  color: rgba(90, 69, 40, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: none;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  transition: background 0.25s;
}
.mini-player .mp-btn:hover .mp-icon { background: rgba(255, 248, 230, 0.7); }
.mini-player .mp-meta { width: 130px; text-align: center; color: #f0e4d0; }
.mini-player .mp-title {
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #d8c8a8;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
}
.mini-player .mp-title-inner {
  display: inline-block;
  padding-left: 100%;
  animation: mp-marquee 10s linear infinite;
}
@keyframes mp-marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
.mini-player .mp-bar {
  height: 4px;
  background: rgba(240,220,180,0.25);
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
  width: 100%;
  touch-action: none;
}
.mini-player .mp-fill {
  height: 100%;
  width: 0%;
  background: #f0e4d0;
  transition: width 0.1s linear;
}
.mini-player .mp-time {
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  color: #c8b890;
  font-variant-numeric: tabular-nums;
  margin-top: 2px;
}
@media (max-width: 600px) {
  .mini-player { right: 10px; bottom: 10px; }
  .mini-player .mp-emoji { font-size: 56px; }
  .mini-player .mp-icon { width: 14px; height: 14px; }
}
</style>

    </span>

</div>

<script>
(function(){
  var root = document.currentScript.previousElementSibling;
  while (root && !root.classList.contains('mini-player')) root = root.previousElementSibling;
  var audio = root.querySelector('audio');
  var btn = root.querySelector('.mp-btn');
  var playI = root.querySelector('.mp-play');
  var pauseI = root.querySelector('.mp-pause');
  var fill = root.querySelector('.mp-fill');
  var bar = root.querySelector('.mp-bar');
  var time = root.querySelector('.mp-time');
  function fmt(t){ if(!isFinite(t)) return '0:00'; var m=Math.floor(t/60), s=Math.floor(t%60); return m+':'+(s<10?'0':'')+s; }
  var src = audio.getAttribute('src') || '';
  root.querySelector('.mp-title-inner').textContent = decodeURIComponent(src.split('/').pop() || '');
  audio.volume = 0.4;
  fetch(src).then(function(r){ return r.blob(); }).then(function(blob){
    var wasPaused = audio.paused;
    var t = audio.currentTime;
    audio.src = URL.createObjectURL(blob);
    audio.addEventListener('loadedmetadata', function once(){
      audio.removeEventListener('loadedmetadata', once);
      audio.currentTime = t;
      if (!wasPaused) audio.play().catch(function(){});
    });
  }).catch(function(){});
  btn.addEventListener('click', function(){ audio.paused ? audio.play() : audio.pause(); });
  audio.addEventListener('play', function(){ playI.style.display='none'; pauseI.style.display=''; });
  audio.addEventListener('pause', function(){ playI.style.display=''; pauseI.style.display='none'; });
  var scrubbing = false;
  audio.addEventListener('timeupdate', function(){
    if (scrubbing) return;
    var p = audio.duration ? (audio.currentTime/audio.duration*100) : 0;
    fill.style.width = p+'%';
    time.textContent = fmt(audio.currentTime);
  });
  audio.addEventListener('loadedmetadata', function(){ time.textContent = fmt(audio.duration); });
  function ratioFromEvent(e){
    var r = bar.getBoundingClientRect();
    return Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  }
  function applyRatio(ratio){
    fill.style.width = (ratio * 100) + '%';
    if (isFinite(audio.duration)) time.textContent = fmt(ratio * audio.duration);
  }
  bar.addEventListener('pointerdown', function(e){
    e.preventDefault();
    e.stopPropagation();
    scrubbing = true;
    applyRatio(ratioFromEvent(e));
  });
  window.addEventListener('pointermove', function(e){
    if (!scrubbing) return;
    applyRatio(ratioFromEvent(e));
  }, true);
  function endScrub(e){
    if (!scrubbing) return;
    var ratio = ratioFromEvent(e);
    scrubbing = false;
    applyRatio(ratio);
    if (isFinite(audio.duration) && audio.duration > 0) {
      audio.currentTime = ratio * audio.duration;
    }
  }
  window.addEventListener('pointerup', endScrub, true);
  window.addEventListener('pointercancel', endScrub, true);
})();
</script>
