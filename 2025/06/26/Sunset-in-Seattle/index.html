<!-- 0627 在 Hexo 页面中加入如下 JS 脚本设置音频和视频默认音量为 20% 插入位置建议：
放在文章 Markdown 中的末尾（用三反引号包住 <script>，或加在 HTML 块中）；
或统一放在主题的 _layout/layout.ejs 或 post.ejs 文件底部（一次生效所有文章页）。
-->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const audios = document.querySelectorAll("audio");
    const videos = document.querySelectorAll("video");

    audios.forEach(audio => {
      audio.volume = 0.2;
    });

    videos.forEach(video => {
      video.volume = 0.2;
    });
  });
</script>
