      <input type="text" id="review-name" placeholder="你的名字" />

<script>
(function(){
  var KEY = 'reviews_20260405_idylwood';
  var stars = document.querySelectorAll('#rating span');
  var current = 0;
  function paint(n){ stars.forEach(function(s){ s.style.color = s.dataset.v <= n ? '#f5b301' : '#ccc'; }); }
  stars.forEach(function(s){
    s.addEventListener('mouseenter', function(){ paint(s.dataset.v); });
    s.addEventListener('mouseleave', function(){ paint(current); });
    s.addEventListener('click', function(){ current = s.dataset.v; paint(current); });
  });
  function load(){ try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ return []; } }
  function render(){
    var list = document.getElementById('review-list');
    list.innerHTML = load().map(function(r){
      return '<li><strong>'+r.name+'</strong> <span style="color:#f5b301;">'+'★'.repeat(r.rating)+'</span><br><span>'+r.text+'</span><br><small>'+r.time+'</small></li>';
    }).join('');
  }
  document.getElementById('review-form').addEventListener('submit', function(e){
    e.preventDefault();
    var name = document.getElementById('review-name').value.trim() || '匿名';
    var text = document.getElementById('review-text').value.trim();
    if(!text || !current) return alert('请打分并写几句～');
    var all = load();
    all.unshift({name:name, text:text, rating:+current, time:new Date().toLocaleString()});
    localStorage.setItem(KEY, JSON.stringify(all));
    document.getElementById('review-text').value = '';
    current = 0; paint(0);
    render();
  });
  render();
})();
</script>

  var scrubbing = false;
  audio.addEventListener('timeupdate', function(){
    if (scrubbing) return;
    var p = audio.duration ? (audio.currentTime/audio.duration*100) : 0;
    fill.style.width = p+'%';
    time.textContent = fmt(audio.currentTime);
  });
  audio.addEventListener('loadedmetadata', function(){ time.textContent = fmt(audio.duration); });
  function ratioFromEvent(e){
    var r = bar.getBoundingClientRect();
    return Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  }
  function applyRatio(ratio){
    fill.style.width = (ratio * 100) + '%';
    if (isFinite(audio.duration)) time.textContent = fmt(ratio * audio.duration);
  }
  bar.addEventListener('pointerdown', function(e){
    e.preventDefault();
    e.stopPropagation();
    scrubbing = true;
    applyRatio(ratioFromEvent(e));
  });
  window.addEventListener('pointermove', function(e){
    if (!scrubbing) return;
    applyRatio(ratioFromEvent(e));
  }, true);
  function endScrub(e){
    if (!scrubbing) return;
    var ratio = ratioFromEvent(e);
    scrubbing = false;
    applyRatio(ratio);
    if (isFinite(audio.duration) && audio.duration > 0) {
      audio.currentTime = ratio * audio.duration;
      var pr = audio.play();
      if (pr && pr.catch) pr.catch(function(){});
    }
  }
  window.addEventListener('pointerup', endScrub, true);
  window.addEventListener('pointercancel', endScrub, true);
})();
</script>
